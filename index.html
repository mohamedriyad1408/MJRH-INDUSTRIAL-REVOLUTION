<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // 🚨 CRITICAL CACHE BUSTER 2.1.0 🚨
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
      }
      const V = "2.1.0";
      if (localStorage.getItem("app_v") !== V) {
        localStorage.clear();
        localStorage.setItem("app_v", V);
        location.reload(true);
      }
    </script>
    <link rel="icon" type="image/png" href="/mjrh-logo.png" />
    <link rel="apple-touch-icon" href="/mjrh-logo.png" />
    <title>MJRH STABLE — نظام تشغيل المغاسل</title>
    <meta name="description" content="MJRH هو نظام تشغيل SaaS متكامل." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Cairo:wght@600;700;900&display=swap" />
  </head>

  </body>
</html>
